<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tandem</title>
  <meta name="description"
    content="Real-time ASL video calling connecting deaf and hearing users through AI-powered sign language recognition." />
  <link rel="stylesheet" href="/style.css" />
</head>

<body>
  <div class="landing-bg">
    <div class="landing-card">
      <div class="landing-wordmark">Tandem</div>
      <!-- <p class="landing-tagline">Real-time communication between deaf and hearing users</p> -->

      <div class="join-grid">
        <a href="/deaf.html" class="join-card deaf-card">
          <div class="join-icon teal">
            <!-- Hand / ASL icon -->
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round" style="color:var(--teal)">
              <path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2" />
              <path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2" />
              <path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8" />
              <path
                d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15" />
            </svg>
          </div>
          <h2>Deaf / Hard of Hearing</h2>
          <p>Sign via your camera. Your ASL is recognised in real time and spoken to the hearing user.</p>
        </a>

        <a href="/hearing.html" class="join-card hearing-card">
          <div class="join-icon rose">
            <!-- Microphone icon -->
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round" style="color:var(--rose)">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
              <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
              <line x1="12" y1="19" x2="12" y2="23" />
              <line x1="8" y1="23" x2="16" y2="23" />
            </svg>
          </div>
          <h2>Hearing</h2>
          <p>Speak loudly. Your words are captioned and rendered as a signing avatar.</p>
        </a>
      </div>

      <p class="landing-info">Both users must join for the call to connect &nbsp;·&nbsp; Chrome/Edge recommended</p>
    </div>
  </div>
</body>

</html>
