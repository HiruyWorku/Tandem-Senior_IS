<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Tandem — Hearing User</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    .btn-icon {
      width: 16px;
      height: 16px;
      display: block;
      flex-shrink: 0;
    }

    .logo-icon {
      width: 18px;
      height: 18px;
      display: block;
    }
  </style>
</head>

<body>
  <div class="app-shell">

    <!-- Top Bar -->
    <header class="topbar">
      <a href="/" class="topbar-brand">
        <div class="topbar-logo">
          <!-- Waveform brand mark -->
          <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round"
            stroke-linejoin="round">
            <path d="M2 12h3M5 7v10M9 4v16M13 9v6M17 6v12M21 12h-3" />
          </svg>
        </div>
        Tandem
      </a>
      <div class="topbar-status">
        <div id="status-dot" class="status-dot waiting"></div>
        <span id="status-text">Initializing…</span>
      </div>
      <span class="topbar-badge badge-hearing">Hearing</span>
    </header>

    <!-- Controls -->
    <div class="controls-bar">
      <button id="toggleMic" class="ctrl-btn mic-on" title="Toggle microphone">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <line x1="12" y1="19" x2="12" y2="23" />
          <line x1="8" y1="23" x2="16" y2="23" />
        </svg>
        <span class="text">Mic</span>
      </button>
      <button id="toggleCamera" class="ctrl-btn camera-on" title="Toggle camera">
        <svg class="btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M23 7l-7 5 7 5V7z" />
          <rect x="1" y="5" width="15" height="14" rx="2" ry="2" />
        </svg>
        <span class="text">Camera</span>
      </button>
    </div>

    <!-- Main Grid: Your Video | Deaf User Video | Detected Signs -->
    <main class="content-grid two-col">

      <!-- Column 1: Local (hearing user) video -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-dot rose"></div>
          <span class="panel-title">You</span>
        </div>
        <div class="panel-body">
          <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <!-- STT subtitle strip — lets the hearing user validate what's being captured -->
        <div class="subtitle-strip" id="localSubtitleStrip">
          <span class="subtitle-label">🎤</span>
          <span id="localCaptions" class="subtitle-text">Speak — your words appear here…</span>
        </div>
      </div>

      <!-- Column 2: Remote (deaf user) video -->
      <div class="panel">
        <div class="panel-header">
          <div class="panel-dot teal"></div>
          <span class="panel-title">Deaf User</span>
        </div>
        <div class="panel-body">
          <video id="remoteVideo" autoplay playsinline></video>
        </div>
      </div>

    </main>

    <!-- Footer -->
    <footer class="footer-bar">
      <span>Speak normally — your words are captioned and signed to the deaf user</span>
      <div id="aslPredictionsList" style="display:flex; flex-wrap:wrap; gap:6px; align-items:center;"></div>
    </footer>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/script.js" type="module"></script>
  <script src="/hearing.js" type="module"></script>
  <script>
    const _statusText = document.getElementById('status-text');
    const _dot = document.getElementById('status-dot');
    new MutationObserver(() => {
      const t = _statusText.textContent.toLowerCase();
      _dot.className = 'status-dot ' + (
        t.includes('wait') ? 'waiting' :
          t.includes('connect') && !t.includes('error') ? 'connected' :
            t.includes('error') ? 'error' : 'waiting'
      );
    }).observe(_statusText, { childList: true, characterData: true, subtree: true });
  </script>
</body>

</html>
